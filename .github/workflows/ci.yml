name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      # Runs the DB-backed suite for real (workflow queue, csvimport
      # Commit, foundation/definition registries) instead of letting
      # TEST_DATABASE_URL-unset skip them silently, the way a local run
      # without a database does.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: universal_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/universal_core_test?sslmode=disable
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/universal_core_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Prep Go cache dirs
        run: |
          mkdir -p "${RUNNER_TEMP}/gobuildcache"
          mkdir -p "${RUNNER_TEMP}/gomodcache"
      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/gobuildcache
            ${{ runner.temp }}/gomodcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: gofmt check
        run: |
          FMT_OUT="$(gofmt -l .)"
          if [ -n "$FMT_OUT" ]; then
            echo "The following files need gofmt:" >&2
            echo "$FMT_OUT" >&2
            exit 1
          fi
      - name: Build
        env:
          GOMODCACHE: ${{ runner.temp }}/gomodcache
          GOCACHE: ${{ runner.temp }}/gobuildcache
        run: go build ./...
      - name: Vet
        env:
          GOMODCACHE: ${{ runner.temp }}/gomodcache
          GOCACHE: ${{ runner.temp }}/gobuildcache
        run: go vet ./...
      # Through cmd/migrate (internal/db.Apply, schema_migrations-tracked)
      # rather than applying internal/db/migrations/*.sql directly with
      # psql — a second, untracked path here would drift from what
      # cmd/universal-core itself does on boot (it did: internal/db's own
      # tests call Apply() too, and previously found the schema already
      # present with nothing recorded, then tried to re-run 001_init.sql
      # into it).
      - name: Apply migrations
        env:
          GOMODCACHE: ${{ runner.temp }}/gomodcache
          GOCACHE: ${{ runner.temp }}/gobuildcache
        run: go run ./cmd/migrate
      - name: Test
        env:
          GOMODCACHE: ${{ runner.temp }}/gomodcache
          GOCACHE: ${{ runner.temp }}/gobuildcache
        # -p 1: every package's tests share ONE live Postgres database
        # (TEST_DATABASE_URL above) — fine while packages only touch their
        # own tenant-scoped rows, but internal/worker's tests run real
        # background pollers against workflow_jobs, and
        # ClaimNext/ReclaimStale are deliberately tenant-*global* (a real
        # deployment has one shared dispatcher servicing every tenant, see
        # queue.go). Without -p 1, Go runs different packages' test
        # binaries concurrently by default, so internal/worker's poller
        # can claim a job internal/kernel/workflow's own synchronous test
        # just enqueued before that test's own ProcessOne call reaches it
        # — a real, if intermittent, cross-package race (first seen
        # 2026-07-21, several merges after internal/worker landed, not on
        # every run). -p 1 serializes package-level test execution so the
        # two can never overlap; -race stays for the same-package data-race
        # detection it's always done, unaffected by this.
        run: go test ./... -race -count=1 -p 1
